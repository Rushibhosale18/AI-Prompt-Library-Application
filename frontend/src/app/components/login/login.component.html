<div class="container fade-in">
  <div class="form-page">
    <div class="page-header">
      <h1>Login</h1>
      <p>Sign in to contribute new prompts to the library</p>
    </div>

    <div class="error-banner" *ngIf="error">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="card login-form">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input id="username" type="text" formControlName="username" class="form-control" placeholder="Enter username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" placeholder="Enter password">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary" [disabled]="loading">
          <span *ngIf="!loading">Sign In</span>
          <span *ngIf="loading" class="btn-loading"><span class="btn-spinner"></span> Signing in...</span>
        </button>
      </div>
    </form>
    
    <div class="auth-hint">
      <p>Use the superuser account you created during setup.</p>
    </div>
  </div>
</div>
